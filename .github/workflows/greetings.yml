name: TakaTime Greetings

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isPR = !!context.payload.pull_request;

            const message = isPR
              ? `👋 Thanks for contributing to TakaTime!

Before review:
- Ensure API compatibility is maintained
- Avoid breaking editor integrations
- Update docs if behavior changes

Maintainers will review soon `
              : `👋 Thanks for reporting an issue in TakaTime!

Please include:
- Server setup (Docker / local / cloud)
- Editor + plugin used (VSCode, Neovim, etc.)
- Steps to reproduce
- Logs or error output

Important:
Check your debug logs at:
~/.takatime/debug.log

Sharing relevant log snippets helps us debug much faster`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: message
            });